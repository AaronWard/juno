[supervisord]
nodaemon=true
logfile=/outputs/cache/supervisord.log
pidfile=/tmp/supervisord.pid
user=root

[program:acestep]
; ACE-Step 1.5 API server (FastAPI/uvicorn based). The exact entry command
; follows the upstream repo. If upstream changes its launcher, adjust here.
command=/bin/bash -lc "cd /app/ACE-Step-1.5 && exec uv run acestep-api --host ${ACESTEP_API_HOST:-0.0.0.0} --port ${ACESTEP_API_PORT:-8001}"
directory=/app/ACE-Step-1.5
autostart=true
autorestart=true
startretries=10
stopwaitsecs=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=10

[program:juno-proxy]
command=/bin/bash -lc "cd /app/juno/ace_proxy && exec node dist/server.js"
directory=/app/juno/ace_proxy
autostart=true
autorestart=true
startretries=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=20
